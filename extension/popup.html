<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Netdisk Downloader</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="shell">
      <header>
        <h1>网盘下载</h1>
        <span id="provider">待识别</span>
      </header>

      <textarea id="shareText" placeholder="粘贴完整分享文字，例如：通过网盘分享的文件：01.mp4&#10;链接: https://pan.baidu.com/s/... 提取码: xibc"></textarea>

      <section class="parsed" aria-live="polite">
        <div>
          <label>链接</label>
          <output id="urlOutput">-</output>
        </div>
        <div>
          <label>提取码</label>
          <output id="codeOutput">-</output>
        </div>
      </section>

      <button id="startButton" type="button" disabled>开始</button>
      <p id="status" role="status"></p>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
